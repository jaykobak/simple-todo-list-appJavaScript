<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Todo List UI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="container py-5">
        <div class="todo-wrapper mx-auto">
            <h1 class="h3 text-center mb-4">Todo List</h1>

            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="input-group mb-4">
                        <input type="text" class="form-control" placeholder="Enter a task" aria-label="Enter a task" id="userInput" />
                        <button class="btn btn-primary" onclick="addItem()" type="button">Add</button>
                    </div>

                    <ul class="list-group" id="listGroup">
                        <li class="list-group-item empty-state text-center py-4" id="emptyState">
                            <i class="bi bi-journal-check empty-icon" aria-hidden="true"></i>
                            <p class="mb-0 mt-2 text-muted">Your list will be shown here</p>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <!-- Link to custom JS -->
    <script src="script.js"></script>
</body>

</html>
