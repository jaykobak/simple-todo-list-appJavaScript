<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Todo List UI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="container py-5">
        <div class="todo-wrapper mx-auto">
            <h1 class="h3 text-center mb-4">Todo List</h1>

            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="input-group mb-4">
                        <input type="text" class="form-control" placeholder="Enter a task" aria-label="Enter a task" />
                        <button class="btn btn-primary" type="button">Add</button>
                    </div>

                    <ul class="list-group">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="todo1" />
                                <label class="form-check-label" for="todo1">Learn arrays</label>
                            </div>
                            <button class="btn btn-sm btn-outline-danger" type="button">Delete</button>
                        </li>

                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="todo2" />
                                <label class="form-check-label" for="todo2">Practice push and pop</label>
                            </div>
                            <button class="btn btn-sm btn-outline-danger" type="button">Delete</button>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
